<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#7C4DFF"/>
      <stop offset="100%" stop-color="#00BCD4"/>
    </linearGradient>
    <linearGradient id="cloud" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#FFFFFF"/>
      <stop offset="100%" stop-color="#E0E0E0"/>
    </linearGradient>
  </defs>
  <rect width="512" height="512" rx="108" fill="url(#bg)"/>
  <!-- Sun -->
  <circle cx="310" cy="180" r="70" fill="#FDB813" opacity="0.95"/>
  <circle cx="310" cy="180" r="90" fill="#FDB813" opacity="0.15"/>
  <!-- Cloud -->
  <ellipse cx="240" cy="270" rx="100" ry="60" fill="url(#cloud)" opacity="0.95"/>
  <ellipse cx="170" cy="290" rx="70" ry="50" fill="url(#cloud)" opacity="0.95"/>
  <ellipse cx="310" cy="285" rx="75" ry="48" fill="url(#cloud)" opacity="0.95"/>
  <ellipse cx="240" cy="300" rx="120" ry="40" fill="url(#cloud)" opacity="0.9"/>
  <!-- Rain drops -->
  <line x1="190" y1="345" x2="180" y2="385" stroke="white" stroke-width="6" stroke-linecap="round" opacity="0.7"/>
  <line x1="240" y1="340" x2="230" y2="390" stroke="white" stroke-width="6" stroke-linecap="round" opacity="0.8"/>
  <line x1="290" y1="345" x2="280" y2="385" stroke="white" stroke-width="6" stroke-linecap="round" opacity="0.7"/>
</svg>
